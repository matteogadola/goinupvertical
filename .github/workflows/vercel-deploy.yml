name: Vercel Deployment
env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

on:
  push:
    branches:
      - main

jobs:
  lint:
    name: Run linters
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Setup Node v18
        uses: actions/setup-node@v3
        with:
          node-version: 18
      - name: Install deps
        run: npm ci
      - name: Prettier
        run: npm run format
      - name: Lint
        run: npm run lint
      - name: Cache project
        uses: actions/cache@v3
        id: project-cache
        with:
          path: /
          key: project-build-${{ github.event.pull_request.head.sha }}
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Setup Node v18
        uses: actions/setup-node@v3
        with:
          node-version: 18
      - name: Install deps
        run: npm ci
      - name: Prettier
        run: npm run format
      - name: Build
        run: npm run build
      #- name: Test
      #  run: npm run test
      - name: Cache build
        uses: actions/cache@v3
        id: build-cache
        with:
          path: /build
          key: cache-build-${{ github.event.pull_request.head.sha }}
  #test:
  # Your lint job (can be anything you want)
  # ...
  tag:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: Klemensas/action-autotag@stable
        with:
          GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
          tag_prefix: 'v'
  deploy:
    # needs: [build, lint] # wait for other jobs
    runs-on: ubuntu-latest
    steps:
      - uses: BetaHuhn/deploy-to-vercel-action@v1
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
